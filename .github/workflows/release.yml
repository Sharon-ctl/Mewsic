name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin --bundles app'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin --bundles app'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf lld clang

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin, x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Adjust version for Windows MSI compatibility
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const version = pkg.version;
            const match = version.match(/^(\d+\.\d+\.\d+)-([a-zA-Z.-]+)?(\d+)?$/);
            if (match) {
              const base = match[1];
              const num = match[3] || "0";
              pkg.version = base + "-" + num;
              fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2), "utf8");
              console.log("Adjusted Windows version for MSI compatibility: " + version + " -> " + pkg.version);
            }
          '
          node sync-version.js

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mewsic v__VERSION__'
          releaseBody: 'See the assets below to download the latest version of Mewsic.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  build-arch:
    needs: release
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Initialize pacman keyring and install git
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Sy --noconfirm git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            webkit2gtk-4.1 gtk3 libayatana-appindicator librsvg \
            nodejs npm rust base-devel patchelf libarchive github-cli

      - name: Install frontend dependencies
        run: npm install

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles deb

      - name: Create pacman package
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          PKGFILE="mewsic-${VERSION}-1-x86_64.pkg.tar.zst"

          mkdir -p pkg/usr/bin pkg/usr/share/applications pkg/usr/share/pixmaps

          cp src-tauri/target/release/mewsic pkg/usr/bin/mewsic
          chmod 755 pkg/usr/bin/mewsic
          cp src-tauri/icons/128x128.png pkg/usr/share/pixmaps/mewsic.png

          printf '[Desktop Entry]\nName=Mewsic\nExec=mewsic %%f\nIcon=mewsic\nType=Application\nCategories=Audio;Music;\nMimeType=audio/mpeg;audio/flac;audio/wav;audio/ogg;audio/mp4;audio/aac;\n' \
            > pkg/usr/share/applications/mewsic.desktop

          SIZE=$(du -sb pkg/usr | awk '{print $1}')
          printf 'pkgname = mewsic\npkgver = %s-1\npkgdesc = A premium offline music player built with Rust and React\nurl = https://github.com/xeoniii/Mewsic\nbuilddate = %s\npackager = GitHub Actions\nsize = %s\narch = x86_64\nlicense = GPL3\ndepend = webkit2gtk-4.1\ndepend = gtk3\ndepend = libayatana-appindicator\ndepend = librsvg\n' \
            "$VERSION" "$(date +%s)" "$SIZE" > pkg/.PKGINFO

          cd pkg && bsdtar --use-compress-program=zstd -cf "../${PKGFILE}" .PKGINFO usr/
          echo "PKGFILE=${PKGFILE}" >> $GITHUB_ENV

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.PKGFILE }}" --repo "${{ github.repository }}"
